<script>
// ============================================================
// CONFIG & CONSTANTS
// ============================================================
const CONFIG = {
    numAI: 7,
    totalLaps: 3,
    trackWidth: 36,
    wallHeight: 4.5,
    trackSegments: 360,
    waypointSpacing: 6,
    maxSpeed: 85,
    boostMultiplier: 1.9,
    boostDuration: 1.8,
    driftChargeRate: 35,
    driftThreshold: 30,
    turnSpeed: 2.4,
    acceleration: 48,
    brakingForce: 35,
    drag: 0.97,
    gravity: -30,
    spawnInterval: 18,
    itemDuration: 12,
    bananaSlideDuration: 1.8,
    rocketSpeed: 75,
    shieldDuration: 5,
    slipstreamRange: 6,
    slipstreamBoost: 1.25,
    boostPadSpeed: 100
};

// Global re-usable pool variables for optimization
const _v3 = new THREE.Vector3();
const _v3b = new THREE.Vector3();
const _v3c = new THREE.Vector3();

function lerp(a, b, t) { return a + (b - a) * Math.min(Math.max(t, 0), 1); }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
const DEG2RAD = Math.PI / 180;

let isMobile = false;
let devicePixelRatio = Math.min(window.devicePixelRatio, 2);

(function detectMobile() {
    const ua = navigator.userAgent.toLowerCase();
    isMobile = /android|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(ua);
    if (isMobile) {
        devicePixelRatio = Math.min(window.devicePixelRatio, 1.5);
    }
})();

// ============================================================
// SOUND SYSTEM
// ============================================================
class SoundManager {
    constructor() {
        this.ctx = null;
        this.initialized = false;
        this.engineNodes = new Map();
        this.masterGain = null;
        this.driftNodes = [];
    }
    init() {
        if (this.initialized) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = 0.5;
            this.masterGain.connect(this.ctx.destination);
            this.initialized = true;
        } catch (e) {}
    }
    startEngine(kartId) {
        if (!this.initialized) return;
        try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 55;
            gain.gain.value = 0.035;
            osc.connect(gain);
            gain.connect(this.masterGain);
            osc.start();
            this.engineNodes.set(kartId, { osc, gain, baseFreq: 55 });
        } catch (e) {}
    }
    updateEngine(kartId, speed, maxSpeed) {
        const node = this.engineNodes.get(kartId);
        if (!node) return;
        const ratio = Math.abs(speed) / maxSpeed;
        node.osc.frequency.value = 55 + ratio * 130;
        node.gain.gain.value = 0.015 + ratio * 0.065;
    }
    stopEngine(kartId) {
        const node = this.engineNodes.get(kartId);
        if (!node) return;
        try { node.osc.stop(); } catch (e) {}
        this.engineNodes.delete(kartId);
    }
    playTone(freq, duration, type, volume) {
        if (!this.initialized) return;
        try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type || 'square';
            osc.frequency.value = freq;
            gain.gain.value = volume || 0.08;
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.masterGain);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        } catch (e) {}
    }
    playBoost() { this.playTone(300, 0.3, 'sawtooth', 0.07); setTimeout(() => this.playTone(520, 0.25, 'sawtooth', 0.05), 100); }
    playItemPickup() { this.playTone(800, 0.08, 'sine', 0.07); setTimeout(() => this.playTone(1200, 0.08, 'sine', 0.05), 80); setTimeout(() => this.playTone(1600, 0.12, 'sine', 0.04), 160); }
    playCollision() { this.playTone(80, 0.25, 'sawtooth', 0.15); this.playTone(60, 0.15, 'square', 0.08); }
    playBananaHit() { this.playTone(200, 0.35, 'square', 0.1); setTimeout(() => this.playTone(100, 0.3, 'sawtooth', 0.07), 120); }
    playRocketFire() { this.playTone(400, 0.12, 'sawtooth', 0.05); setTimeout(() => this.playTone(650, 0.1, 'sine', 0.04), 80); }
    playShield() { this.playTone(600, 0.12, 'sine', 0.05); setTimeout(() => this.playTone(900, 0.12, 'sine', 0.04), 100); setTimeout(() => this.playTone(1200, 0.15, 'sine', 0.03), 200); }
    playCountdown() { this.playTone(440, 0.12, 'sine', 0.07); }
    playGo() { this.playTone(880, 0.35, 'sine', 0.12); this.playTone(1100, 0.2, 'sine', 0.06); }
    playFinish() { const n = [523, 659, 784, 1047]; n.forEach((f, i) => setTimeout(() => this.playTone(f, 0.3, 'sine', 0.07), i * 150)); }
    playDrift() {
        if (!this.initialized) return;
        try {
            const gain = this.ctx.createGain(); gain.gain.value = 0.02; gain.connect(this.masterGain);
            const src = this.ctx.createBufferSource();
            const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.1, this.ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
            src.buffer = buf; src.loop = true; src.connect(gain); src.start();
            this.driftNodes.push({ src, gain });
        } catch (e) {}
    }
    stopDrift() {
        if (this.driftNodes) {
            this.driftNodes.forEach(n => {
                try {
                    n.gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                    setTimeout(() => { try { n.src.stop(); } catch (e) {} }, 100);
                } catch (e) {}
            });
            this.driftNodes = [];
        }
    }
}
const sound = new SoundManager();

// ============================================================
// PROCEDURAL TEXTURES
// ============================================================
function makeRoadTexture() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 256;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#3a3a3e'; ctx.fillRect(0, 0, 256, 256);
    const id = ctx.getImageData(0, 0, 256, 256); const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
        const n = (Math.random() * 30 + 40) | 0;
        d[i] = n; d[i + 1] = n; d[i + 2] = n + 3; d[i + 3] = 255;
    }
    ctx.putImageData(id, 0, 0);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.anisotropy = 2;
    return tex;
}

function makeGrassTexture() {
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#4a7c3f'; ctx.fillRect(0, 0, 128, 128);
    const id = ctx.getImageData(0, 0, 128, 128); const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
        const noise = Math.random() * 30 - 15;
        d[i] = 60 + noise; d[i + 1] = 120 + noise; d[i + 2] = 50 + noise; d[i + 3] = 255;
    }
    ctx.putImageData(id, 0, 0);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(30, 30);
    tex.anisotropy = 1;
    return tex;
}

function makeSkyTexture() {
    const c = document.createElement('canvas'); c.width = 512; c.height = 256;
    const ctx = c.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0, '#1a2a6c'); grad.addColorStop(0.3, '#3a6cc9');
    grad.addColorStop(0.55, '#6db3f2'); grad.addColorStop(0.78, '#b5d9f5');
    grad.addColorStop(0.88, '#d4e6f0'); grad.addColorStop(1, '#e8dcc8');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 512, 256);
    for (let i = 0; i < 20; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.08})`;
        ctx.beginPath();
        ctx.ellipse(Math.random() * 512, Math.random() * 128, Math.random() * 60 + 20, Math.random() * 8 + 4, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    return new THREE.CanvasTexture(c);
}

// ============================================================
// TRACK SYSTEM
// ============================================================
let trackSpline, trackWaypoints = [], trackMeshes = [];
let finishLinePos = new THREE.Vector3(), trackNormal = new THREE.Vector3(), trackRightVec = new THREE.Vector3();
let trackLength = 0, boostPadPositions = [];

function getCurvature(t) {
    const step = 0.005;
    const t1 = Math.min(t + step, 1), t0 = Math.max(t - step, 0);
    const tan1 = trackSpline.getTangentAt(t1), tan0 = trackSpline.getTangentAt(t0);
    return tan1.clone().sub(tan0).length() / step;
}

function buildTrack() {
    const pts = [
        new THREE.Vector3(0, 0, -220), new THREE.Vector3(150, 3, -180), new THREE.Vector3(260, -2, -90),
        new THREE.Vector3(310, 5, 50), new THREE.Vector3(220, -3, 180), new THREE.Vector3(70, 2, 220),
        new THREE.Vector3(-150, -4, 180), new THREE.Vector3(-280, 3, 60), new THREE.Vector3(-260, -2, -90),
        new THREE.Vector3(-150, 1, -190)
    ];

    trackSpline = new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);
    const segs = CONFIG.trackSegments;
    const hw = CONFIG.trackWidth / 2;

    const roadPos = [], roadUVs = [], roadIdx = [];
    const wallPos = [], wallIdx = [];
    const kerbPos = [], kerbUVs = [], kerbIdx = [];

    for (let i = 0; i <= segs; i++) {
        const t = i / segs;
        const pt = trackSpline.getPointAt(t);
        const tan = trackSpline.getTangentAt(t).normalize();
        const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
        if (right.length() < 0.01) right.set(1, 0, 0);

        const l = pt.clone().add(right.clone().multiplyScalar(-hw));
        const r = pt.clone().add(right.clone().multiplyScalar(hw));

        roadPos.push(l.x, l.y, l.z, r.x, r.y, r.z);
        roadUVs.push(0, t * 8, 1, t * 8);

        if (i < segs) {
            const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
            roadIdx.push(a, c, b, b, c, d);
        }

        const curv = getCurvature(t);
        if (curv > 0.3) {
            const kWidth = 0.8;
            for (let side = -1; side <= 1; side += 2) {
                const kL = pt.clone().add(right.clone().multiplyScalar(side * (hw + kWidth * 0.5)));
                const kR = pt.clone().add(right.clone().multiplyScalar(side * (hw - kWidth * 0.5)));
                const base = kerbPos.length / 3;
                kerbPos.push(kL.x, 0.01, kL.z, kR.x, 0.01, kR.z, kR.x, 0.3, kR.z, kL.x, 0.3, kL.z);
                const colorVal = i % 2 === 0 ? 1 : 0;
                for (let v = 0; v < 4; v++) { kerbUVs.push(colorVal, t); }
                if (i < segs) {
                    const nb = base + 4;
                    kerbIdx.push(base, nb, base + 1, base + 1, nb, nb + 1, base + 1, nb + 1, base + 2, base + 2, nb + 1, nb + 2);
                }
            }
        }

        const wh = CONFIG.wallHeight;
        const wbase = wallPos.length / 3;
        wallPos.push(l.x, l.y - 0.5, l.z, r.x, r.y - 0.5, r.z, r.x, r.y + wh, r.z, l.x, l.y + wh, l.z);
        if (i < segs) {
            const nb = wbase + 4;
            wallIdx.push(wbase, nb, wbase + 1, wbase + 1, nb, nb + 1);
        }

        if (i === 0) {
            finishLinePos.copy(pt);
            trackNormal.copy(tan);
            trackRightVec.copy(right);
        }
    }

    const roadGeo = new THREE.BufferGeometry();
    roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(roadPos, 3));
    roadGeo.setAttribute('uv', new THREE.Float32BufferAttribute(roadUVs, 2));
    roadGeo.setIndex(roadIdx); roadGeo.computeVertexNormals();
    const road = new THREE.Mesh(roadGeo, new THREE.MeshStandardMaterial({ map: makeRoadTexture(), color: 0x999aaa, roughness: 0.85, side: THREE.DoubleSide }));
    road.receiveShadow = true; scene.add(road); trackMeshes.push(road);

    if (kerbPos.length > 0) {
        const kerbGeo = new THREE.BufferGeometry();
        kerbGeo.setAttribute('position', new THREE.Float32BufferAttribute(kerbPos, 3));
        kerbGeo.setAttribute('uv', new THREE.Float32BufferAttribute(kerbUVs, 2));
        kerbGeo.setIndex(kerbIdx); kerbGeo.computeVertexNormals();
        const kerbMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6, side: THREE.DoubleSide });
        const colors = new Float32Array((kerbGeo.attributes.position.count) * 3);
        for (let i = 0; i < kerbGeo.attributes.position.count; i++) {
            const isRed = Math.floor(i / 4) % 2 === 0;
            colors[i * 3] = isRed ? 1 : 0.95; colors[i * 3 + 1] = isRed ? 0.15 : 0.95; colors[i * 3 + 2] = isRed ? 0.1 : 0.95;
        }
        kerbGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3)); kerbMat.vertexColors = true;
        const km = new THREE.Mesh(kerbGeo, kerbMat); km.receiveShadow = true; scene.add(km);
    }

    const wallGeo = new THREE.BufferGeometry();
    wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallPos, 3));
    wallGeo.setIndex(wallIdx); wallGeo.computeVertexNormals();
    const wall = new THREE.Mesh(wallGeo, new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5, side: THREE.DoubleSide }));
    scene.add(wall);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshStandardMaterial({ map: makeGrassTexture(), roughness: 1 }));
    ground.rotation.x = -Math.PI / 2; ground.position.y = -0.5; ground.receiveShadow = true; scene.add(ground);

    // Decorate Details (Simplified loop)
    for (let i = 2; i < segs; i += 12) {
        const t = i / segs;
        const pt = trackSpline.getPointAt(t);
        const tan = trackSpline.getTangentAt(t).normalize();
        const right = new THREE.Vector3().crossVectors(tan, new THREE.Vector3(0, 1, 0)).normalize();
        const bPos = pt.clone().add(right.multiplyScalar(rand(-1, 1) * (hw + 4)));
        const m = new THREE.Mesh(new THREE.SphereGeometry(rand(0.3, 0.7), 5, 5), new THREE.MeshStandardMaterial({ color: 0x448833 }));
        m.position.set(bPos.x, 0.2, bPos.z); scene.add(m);
    }

    boostPadPositions = [];
    for (let i = 20; i < segs; i += 45) {
        const pt = trackSpline.getPointAt(i / segs);
        boostPadPositions.push({ pos: pt.clone(), active: true, cooldown: 0 });
    }

    const wpCount = Math.floor(segs * (CONFIG.waypointSpacing / (trackSpline.getLength() / segs)));
    trackWaypoints = []; trackLength = trackSpline.getLength();
    for (let i = 0; i < wpCount; i++) {
        const t = i / wpCount;
        trackWaypoints.push({ pos: trackSpline.getPointAt(t), tangent: trackSpline.getTangentAt(t).normalize(), right: new THREE.Vector3().crossVectors(trackSpline.getTangentAt(t), new THREE.Vector3(0, 1, 0)).normalize() });
    }
}

function getClosestWaypointIndex(pos) {
    let minDist = Infinity, minIdx = 0;
    for (let i = 0; i < trackWaypoints.length; i++) {
        const d = pos.distanceToSquared(trackWaypoints[i].pos);
        if (d < minDist) { minDist = d; minIdx = i; }
    }
    return minIdx;
}

function constrainToTrack(pos) {
    const idx = getClosestWaypointIndex(pos);
    const wp = trackWaypoints[idx];
    const diff = _v3.copy(pos).sub(wp.pos);
    const lateral = diff.dot(wp.right);
    const hw = CONFIG.trackWidth / 2 - 1;
    if (Math.abs(lateral) > hw) {
        pos.sub(wp.right.clone().multiplyScalar((Math.abs(lateral) - hw) * Math.sign(lateral)));
        return true;
    }
    pos.y = Math.max(pos.y, 0.6);
    return false;
}

// KART CLASS
// ============================================================
let kartIdCounter = 0;
class Kart {
    constructor(isPlayer, skinIndex) {
        this.id = kartIdCounter++;
        this.isPlayer = isPlayer;
        this.speed = 0;
        this.maxSpeed = CONFIG.maxSpeed + rand(-4, 4);
        this.acceleration = CONFIG.acceleration + rand(-4, 4);
        this.position = new THREE.Vector3();
        this.rotation = new THREE.Euler(0, 0, 0);
        this.quaternion = new THREE.Quaternion();
        this.driftAngle = 0;
        this.isDrifting = false;
        this.boostGauge = 0;
        this.boostTimer = 0;
        this.boostActive = false;
        this.lap = 0;
        this.lastWaypointIdx = 0;
        this.finished = false;
        this.finishTime = 0;
        this.spinTimer = 0;
        this.hitCooldown = 0;
        this.currentItem = null;
        this.shieldTimer = 0;
        this.hasShield = false;
        this.tiltAngle = 0;
        this.wheelSpin = 0;
        this.lapStartTime = 0;
        this.bestLapTime = Infinity;

        this.skinIndex = skinIndex || randInt(0, 7);
        this.skinColors = [
            { body: 0xcc4444, accent: 0x882222, stripe: 0xffffff },
            { body: 0x44bb44, accent: 0x227722, stripe: 0xffffff },
            { body: 0xffaa33, accent: 0xcc7722, stripe: 0xffffff },
            { body: 0xdd44dd, accent: 0x992299, stripe: 0xffffff }
        ];
        this.color = this.skinColors[this.skinIndex % this.skinColors.length];
        this.createMesh();
    }

    createMesh() {
        this.group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 3.4, 12), new THREE.MeshStandardMaterial({ color: this.color.body, roughness: 0.5 }));
        body.rotation.x = Math.PI / 2; body.position.y = 0.6; body.castShadow = true;
        this.group.add(body);

        this.wheels = [];
        const wPos = [[-1.5, 0.15, 1.3], [1.5, 0.15, 1.3], [-1.5, 0.15, -1.3], [1.5, 0.15, -1.3]];
        wPos.forEach(p => {
            const wg = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            wg.rotation.x = Math.PI / 2; wg.position.set(p[0], p[1], p[2]);
            this.group.add(wg); this.wheels.push(wg);
        });

        this.boostFire = [];
        const fMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, transparent: true, opacity: 0 });
        const fire = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.8, 6), fMat);
        fire.position.set(0, 0.3, -1.9); fire.rotation.x = Math.PI / 2;
        this.group.add(fire); this.boostFire.push(fire);

        this.shieldMesh = new THREE.Mesh(new THREE.SphereGeometry(2, 12, 12), new THREE.MeshStandardMaterial({ color: 0x44aaff, transparent: true, opacity: 0.2, wireframe: true }));
        this.shieldMesh.position.y = 0.8; this.shieldMesh.visible = false;
        this.group.add(this.shieldMesh);

        scene.add(this.group);
    }

    setPosition(pos, rotY) {
        this.position.copy(pos); this.rotation.y = rotY || 0;
        this.group.position.copy(pos); this.group.rotation.y = this.rotation.y;
    }

    update(dt) {
        if (this.finished) return;

        if (this.spinTimer > 0) {
            this.spinTimer -= dt; this.rotation.y += dt * 10; this.speed *= 0.9;
        }

        if (this.boostTimer > 0) {
            this.boostTimer -= dt; this.boostActive = true;
            this.boostFire.forEach(f => { f.material.opacity = 0.8; });
            if (this.boostTimer <= 0) { this.boostActive = false; this.boostFire.forEach(f => { f.material.opacity = 0; }); }
        }

        if (this.shieldTimer > 0) {
            this.shieldTimer -= dt; this.shieldMesh.visible = true;
            if (this.shieldTimer <= 0) this.shieldMesh.visible = false;
        }

        const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(this.group.quaternion);
        this.position.add(fwd.multiplyScalar(this.speed * dt));
        constrainToTrack(this.position);

        const wpIdx = getClosestWaypointIndex(this.position);
        if (wpIdx < this.lastWaypointIdx - 20) {
            this.lap++;
            if (this.lap >= CONFIG.totalLaps) { this.finished = true; this.finishTime = raceTime; }
        }
        this.lastWaypointIdx = wpIdx;

        this.group.position.copy(this.position);
        this.group.rotation.y = this.rotation.y + this.driftAngle * 0.2;

        if (this.isPlayer) sound.updateEngine('player', this.speed, this.maxSpeed);
    }

    useItem(items, allKarts) {
        if (!this.currentItem) return;
        const type = this.currentItem; this.currentItem = null;
        if (this.isPlayer) updateItemDisplay(this);

        if (type === 'boost') { this.boostTimer = CONFIG.boostDuration; sound.playBoost(); }
        if (type === 'shield') { this.shieldTimer = CONFIG.shieldDuration; sound.playShield(); }
    }
}

let particles = [], speedLines = [], rainDrops = [], isRaining = false, rainIntensity = 0;

function spawnParticles(pos, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({ pos: pos.clone(), vel: new THREE.Vector3(rand(-1, 1), rand(1, 3), rand(-1, 1)), life: 0.5, color: color });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.pos.add(p.vel.clone().multiplyScalar(dt)); p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawScreenEffects() {
    const canvas = document.getElementById('speedLinesCanvas'); if (!canvas) return;
    const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width, h = canvas.height;

    const grad = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.8);
    grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
}

const keys = { w: false, s: false, a: false, d: false, space: false };
window.addEventListener('keydown', e => {
    sound.init();
    if (e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') keys.w = true;
    if (e.key.toLowerCase() === 's' || e.key === 'ArrowDown') keys.s = true;
    if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') keys.a = true;
    if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') keys.d = true;
    if (e.key === ' ') keys.space = true;
    if (e.key.toLowerCase() === 'e' && playerKart) playerKart.useItem(items, aiKarts.concat(playerKart));
});
window.addEventListener('keyup', e => {
    if (e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') keys.w = false;
    if (e.key.toLowerCase() === 's' || e.key === 'ArrowDown') keys.s = false;
    if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') keys.a = false;
    if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') keys.d = false;
    if (e.key === ' ') keys.space = false;
});

const touch = { forward: false, backward: false, left: false, right: false, drift: false, item: false };
function createTouchControls() {
    if (!isMobile) return;
    const div = document.createElement('div');
    div.id = 'touchOverlay'; div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:15;touch-action:none';
    div.innerHTML = `
      <div id="t-left" style="position:absolute;left:0;top:0;width:30%;height:100%"></div>
      <div id="t-right" style="position:absolute;right:0;top:0;width:30%;height:100%"></div>
      <div id="t-up" style="position:absolute;left:30%;top:0;width:40%;height:50%"></div>
      <div id="t-down" style="position:absolute;left:30%;top:50%;width:40%;height:50%"></div>
    `;
    document.body.appendChild(div);
    
    const bindTouch = (id, key) => {
        const el = document.getElementById(id); if (!el) return;
        el.addEventListener('touchstart', e => { e.preventDefault(); touch[key] = true; }, { passive: false });
        el.addEventListener('touchend', e => { e.preventDefault(); touch[key] = false; }, { passive: false });
    };
    bindTouch('t-left', 'left'); bindTouch('t-right', 'right');
}

function updateItemDisplay(k) {
    const el = document.getElementById('itemDisplay'); if (!el) return;
    if (k.currentItem) { el.innerText = '🚀'; el.classList.add('has-item'); }
    else { el.innerText = ''; el.classList.remove('has-item'); }
}

function updateHUD() {
    if (!playerKart) return;
    document.getElementById('speedDisplay').innerText = Math.round(Math.abs(playerKart.speed));
    document.getElementById('speedBarFill').style.width = `${Math.min(100, (Math.abs(playerKart.speed)/CONFIG.maxSpeed)*100)}%`;
    document.getElementById('lapCounter').innerHTML = `LAP <span class="lap-anim">${Math.min(CONFIG.totalLaps, playerKart.lap + 1)}</span> / ${CONFIG.totalLaps}`;
}

let raceTime = 0;
function loop() {
    if (!gameRunning) return;
    requestAnimationFrame(loop);
    const dt = Math.min(clock.getDelta(), 0.1);

    if (raceState === 'racing') {
        raceTime += dt;
        
        // Player control logic
        let accel = keys.w || touch.forward;
        let brake = keys.s || touch.backward;
        if (accel) playerKart.speed = lerp(playerKart.speed, playerKart.maxSpeed, dt * 2);
        else if (brake) playerKart.speed = lerp(playerKart.speed, -playerKart.maxSpeed * 0.4, dt * 4);
        else playerKart.speed = lerp(playerKart.speed, 0, dt * CONFIG.drag);

        let turn = 0;
        if (keys.a || touch.left) turn = 1;
        if (keys.d || touch.right) turn = -1;
        playerKart.rotation.y += turn * CONFIG.turnSpeed * dt * (playerKart.speed / CONFIG.maxSpeed);

        playerKart.update(dt);
        aiKarts.forEach(ai => {
            ai.speed = ai.maxSpeed * 0.8;
            ai.update(dt);
        });

        // Camera follow
        const cp = new THREE.Vector3(0, 7, 16).applyQuaternion(playerKart.group.quaternion).add(playerKart.position);
        camera.position.lerp(cp, dt * 6); camera.lookAt(_v3b.copy(playerKart.position).add(new THREE.Vector3(0, 2, 0)));
    }

    updateParticles(dt);
    drawScreenEffects();
    updateHUD();
    renderer.render(scene, camera);
}

function startRace() {
    document.getElementById('loadingScreen').style.display = 'none';
    buildTrack();
    playerKart = new Kart(true, 0);
    playerKart.setPosition(new THREE.Vector3(0, 0.6, -210), 0);
    sound.startEngine('player');

    for (let i = 0; i < CONFIG.numAI; i++) {
        const ai = new Kart(false, i + i);
        ai.setPosition(new THREE.Vector3(rand(-8, 8), 0.6, -230 - i * 10), 0);
        aiKarts.push(ai);
    }

    let cnt = 3;
    const cdEl = document.getElementById('countdown'); cdEl.style.opacity = 1;
    const interval = setInterval(() => {
        if (cnt > 0) { cdEl.innerText = cnt; sound.playCountdown(); cnt--; }
        else if (cnt === 0) { cdEl.innerText = 'GO!'; cdEl.classList.add('go'); sound.playGo(); raceState = 'racing'; cnt--; }
        else { clearInterval(interval); cdEl.style.opacity = 0; }
    }, 1000);

    loop();
}

function restartRace() { window.location.reload(); }

window.onload = () => {
    const canvas = document.getElementById('speedLinesCanvas');
    if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    initScene(); createTouchControls(); setTimeout(startRace, 1000);
};
</script>
