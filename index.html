// ============================================================
function updateProjectiles(dt,allKarts){
    for(let i=items.length-1;i>=0;i--){
        const item=items[i];
        if(!item.active)continue;

        if(item.type==='rocket'){
            item.lifetime-=dt;
            if(item.lifetime<=0){scene.remove(item.mesh);items.splice(i,1);continue;}

            if(item.target&&!item.target.finished){
                const toTarget=item.target.position.clone().sub(item.position);
                const dir=toTarget.normalize();
                item.velocity.lerp(dir.multiplyScalar(CONFIG.rocketSpeed),dt*3.5);
                item.velocity.normalize().multiplyScalar(CONFIG.rocketSpeed);
            }

            item.position.add(item.velocity.clone().multiplyScalar(dt));
            item.mesh.position.copy(item.position);
            if(item.velocity.length()>0.1){
                const lookTarget=item.position.clone().add(item.velocity);
                item.mesh.lookAt(lookTarget);
            }
            spawnParticles(item.position.clone(),0xff4400,1,0.1,0.5);

            for(const k of allKarts){
                if(k===item.owner||k.finished)continue;
                if(k.hasShield)continue;
                if(k.position.distanceTo(item.position)<2){
                    k.spinTimer=CONFIG.bananaSlideDuration;
                    k.speed*=0.3;
                    sound.playBananaHit();
                    spawnParticles(k.position.clone(),0xff4444,25,1,6);
                    screenShake.intensity=0.5;screenShake.timer=0.3;
                    scene.remove(item.mesh);items.splice(i,1);break;
                }
            }
            if(item.position.length()>500){scene.remove(item.mesh);items.splice(i,1);}
        }else if(item.type==='banana'){
            item.timer-=dt;
            if(item.timer<=0){scene.remove(item.mesh);items.splice(i,1);continue;}
            for(const k of allKarts){
                if(k===item.owner||k.finished||k.spinTimer>0)continue;
                if(k.hasShield)continue;
                if(k.position.distanceTo(item.position)<2){
                    k.spinTimer=CONFIG.bananaSlideDuration;
                    k.speed*=0.25;
                    sound.playBananaHit();
                    spawnParticles(k.position.clone(),0xffff00,20,1,5);
                    screenShake.intensity=0.3;screenShake.timer=0.2;
                    scene.remove(item.mesh);items.splice(i,1);break;
                }
            }
        }
    }
}

// ============================================================
// COLLISION
// ============================================================
function checkKartCollisions(karts){
    for(let i=0;i<karts.length;i++){
        for(let j=i+1;j<karts.length;j++){
            const a=karts[i],b=karts[j];
            if(a.finished||b.finished)continue;
            const diff=a.position.clone().sub(b.position);
            const dist=diff.length();
            const minDist=2.8;
            if(dist<minDist){
                const push=diff.normalize().multiplyScalar((minDist-dist)*0.5);
                a.position.add(push);b.position.sub(push);
                const relVel=a.speed-b.speed;
                a.speed-=relVel*0.3;b.speed+=relVel*0.3;
                a.hitCooldown=0.3;b.hitCooldown=0.3;
                if(Math.abs(relVel)>15){
                    sound.playCollision();
                    screenShake.intensity=0.4;screenShake.timer=0.25;
                    spawnParticles(a.position.clone().add(b.position.clone()).multiplyScalar(0.5),0xffffff,15,1,4);
                }
            }
        }
    }
}

function checkBoostPads(kart,dt){
    if(kart.finished)return;
    for(const bp of boostPadPositions){
        if(!bp.active)continue;

                kart.boostActive=true;
                spawnParticles(kart.position.clone(),0x00ddff,15);
                sound.playBoost();

        }

}

            if(bp.cooldown<=0){

            }

    }
}

function updateHUD(){
    if(!playerKart)return;
    const lap=Math.min(playerKart.lap+1,CONFIG.totalLaps);
    document.getElementById('lapCounter').innerHTML=`LAP <span class="lap-anim">${lap}</span> / ${CONFIG.totalLaps}`;

    const rank=getPlayerRank();
    const rankEmojis=['🥇','🥈','🥉','4th','5th','6th','7th','8th'];
    document.getElementById('rankDisplay').textContent=`${rankEmojis[rank-1]||rank+'th'}`;

    const speed=Math.abs(playerKart.speed)*3.2;
    document.getElementById('speedDisplay').textContent=Math.round(speed);

    const speedPct=Math.abs(playerKart.speed)/playerKart.maxSpeed*100;
    document.getElementById('speedBarFill').style.width=`${Math.min(speedPct,100)}%`;

    const boostPct=Math.min(playerKart.boostGauge/CONFIG.driftThreshold*100,100);
    const bf=document.getElementById('boostGaugeFill');
    bf.style.width=`${boostPct}%`;
    bf.classList.toggle('active',playerKart.boostTimer>0);

    updateItemDisplay(playerKart);

    // Lap time display
    if(!playerKart.finished){
        const currentLapTime=raceTime-playerKart.lapStartTime;
        document.getElementById('lapTimeDisplay').textContent=
            `${Math.floor(currentLapTime/60)}:${(currentLapTime%60).toFixed(2).padStart(5,'0')}`;
    }
    if(playerKart.bestLapTime<Infinity){
        const bt=playerKart.bestLapTime;
        document.getElementById('bestLapDisplay').textContent=
            `BEST ${Math.floor(bt/60)}:${(bt%60).toFixed(2).padStart(5,'0')}`;
    }

    if(playerKart.finished&&raceState==='racing'){
        raceState='finished';
        sound.playFinish();
        showResults();
    }
}

function getPlayerRank(){
    const allKarts=[playerKart,...aiKarts];
    const sorted=[...allKarts].sort((a,b)=>{
        if(a.finished&&!b.finished)return -1;
        if(!a.finished&&b.finished)return 1;
        if(a.finished&&b.finished)return a.finishTime-b.finishTime;
        if(a.lap!==b.lap)return b.lap-a.lap;
        return b.lastWaypointIdx-a.lastWaypointIdx;
    });
    return sorted.indexOf(playerKart)+1;
}

// MINIMAP
// ============================================================
function drawMinimap(){
    const canvas=document.getElementById('minimapCanvas');
    const ctx=canvas.getContext('2d');
    const w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);

    // Dark bg
    const grad=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
    grad.addColorStop(0,'rgba(0,30,60,0.8)');
    grad.addColorStop(1,'rgba(0,10,20,0.9)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,w,h);

    const cx=w/2,cy=h/2,scale=0.28;

    // Track fill
    ctx.beginPath();
    for(let i=0;i<=trackWaypoints.length;i++){
        const wp=trackWaypoints[i%trackWaypoints.length];
        const wx=cx+wp.pos.x*scale,wz=cy+wp.pos.z*scale;
        if(i===0)ctx.moveTo(wx,wz);else ctx.lineTo(wx,wz);
    }
    ctx.closePath();
    ctx.fillStyle='rgba(80,80,100,0.5)';
    ctx.fill();
    ctx.strokeStyle='rgba(200,200,220,0.4)';
    ctx.lineWidth=2;
    ctx.stroke();

    // Finish line
    const swp=trackWaypoints[0];
    const sx=cx+swp.pos.x*scale,sz=cy+swp.pos.z*scale;
    ctx.fillStyle='#ff4444';
    ctx.shadowColor='#ff4444';ctx.shadowBlur=10;
    ctx.fillRect(sx-4,sz-4,8,8);
    ctx.shadowBlur=0;

    // Player direction indicator
    if(playerKart){
        const px=cx+playerKart.position.x*scale;
        const pz=cy+playerKart.position.z*scale;
        const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(playerKart.group.quaternion);
        ctx.fillStyle='#00ff44';
        ctx.shadowColor='#00ff44';ctx.shadowBlur=12;
        ctx.beginPath();
        ctx.arc(px,pz,5,0,Math.PI*2);
        ctx.fill();
        // Direction triangle
        ctx.shadowBlur=0;
        ctx.fillStyle='#00ff44';
        ctx.beginPath();
        ctx.moveTo(px+fwd.x*scale*8,pz+fwd.z*scale*8);
        ctx.lineTo(px+fwd.z*scale*-3+fwd.x*scale*-2,pz+fwd.x*scale*3+fwd.z*scale*-2);
        ctx.lineTo(px+fwd.z*scale*3+fwd.x*scale*-2,pz+fwd.x*scale*-3+fwd.z*scale*-2);
        ctx.fill();
    }

    // AI karts
    for(const ai of aiKarts){
        const ax=cx+ai.position.x*scale,az=cy+ai.position.z*scale;
        ctx.fillStyle=ai.finished?'rgba(100,100,100,0.5)':'#ff8800';
        ctx.shadowColor=ai.finished?'transparent':'#ff8800';
        ctx.shadowBlur=ai.finished?0:6;
        ctx.beginPath();
        ctx.arc(ax,az,3,0,Math.PI*2);
        ctx.fill();
        ctx.shadowBlur=0;
    }
}

function startCountdown(){
    const el=document.getElementById('countdown');
    if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}
    el.style.opacity=1;
    let count=3;
    el.textContent=count;el.classList.remove('go');
    sound.playCountdown();

    countdownInterval=setInterval(()=>{
        count--;
        if(count>0){
            el.textContent=count;el.classList.remove('go');
            sound.playCountdown();
        }else if(count===0){
            el.textContent='GO!';el.classList.add('go');
            sound.playGo();
            raceState='racing';
        }else{
            el.style.opacity=0;
            clearInterval(countdownInterval);countdownInterval=null;
        }
    },1000);
}

// ============================================================
// INIT RACE
// ============================================================
function initRace(){
    const startWp=trackWaypoints[0];
    const startPos=startWp.pos.clone();

    // Use quaternion to align kart forward (0,0,-1) with track direction
    const forwardRef=new THREE.Vector3(0,0,-1);
    const trackDir=startWp.tangent.clone().normalize();
    const alignQ=new THREE.Quaternion().setFromUnitVectors(forwardRef,trackDir);
    const alignEuler=new THREE.Euler().setFromQuaternion(alignQ);

    playerKart=new Kart(true,0);
    const pPos=startPos.clone().add(startWp.right.clone().multiplyScalar(0));
    pPos.y=0.9;
    playerKart.setPosition(pPos,alignEuler.y);
    playerKart.lapStartTime=0;
    scene.add(playerKart.group);
    sound.startEngine('player');

    const aiColors=[1,2,3,4,5,6,7];
    for(let i=0;i<CONFIG.numAI;i++){
        const ai=new Kart(false,aiColors[i%aiColors.length]);
        const offset=((i+1)%2===0?1:-1)*((Math.floor((i+1)/2))*2.5);
        const aPos=startPos.clone().add(startWp.right.clone().multiplyScalar(offset));
        aPos.y=0.9;
        const aiZOff=-(Math.floor((i+1)/2)+1)*4;
        aPos.add(startWp.tangent.clone().multiplyScalar(aiZOff));
        ai.setPosition(aPos,alignEuler.y);
        ai.aggressiveness=rand(0.3,1.0);
        ai.maxSpeed=CONFIG.maxSpeed+rand(-6,6)+ai.aggressiveness*4;
        ai.lastWaypointIdx=0;
        ai.lapStartTime=0;
        scene.add(ai.group);
        aiKarts.push(ai);
        sound.startEngine('ai_'+ai.id);
    }

    spawnItemPickups();
    // Random weather
    if(Math.random()<0.35){
        initRain();
        // Darken scene for rain
        scene.background=new THREE.Color(0x3a5a8a);
        scene.fog=new THREE.Fog(0x3a5a8a,250,550);
        document.getElementById('weatherInd').style.display='inline';
    }
    startCountdown();
}

// ============================================================
// PARTICLE MESH
// ============================================================
let particleSystem=null;

function initParticleSystem(){
    const geo=new THREE.BufferGeometry();
    const mat=new THREE.PointsMaterial({
        size:0.2,vertexColors:true,transparent:true,opacity:0.8,
        blending:THREE.AdditiveBlending,depthWrite:false
    });
    particleSystem=new THREE.Points(geo,mat);
    particleSystem.frustumCulled=false;
    scene.add(particleSystem);
}

function updateParticleMesh(dt){
    const data=updateParticles(dt||1/60);
    const count=data.positions.length/3;
    if(count===0){particleSystem.visible=false;return;}
    particleSystem.visible=true;
    const geo=particleSystem.geometry;
    geo.setAttribute('position',new THREE.Float32BufferAttribute(data.positions,3));
    geo.setAttribute('color',new THREE.Float32BufferAttribute(data.colors,3));
    geo.setAttribute('size',new THREE.Float32BufferAttribute(data.sizes,1));
    geo.setDrawRange(0,count);
}

// ============================================================
// CAMERA
// ============================================================
function updateCamera(){
    if(!playerKart)return;
    const target=playerKart.position;
    const forward=new THREE.Vector3(0,0,-1).applyQuaternion(playerKart.group.quaternion);

    const speedFactor=Math.abs(playerKart.speed)/playerKart.maxSpeed;
    const camDist=17+speedFactor*3;
    const camHeight=10+Math.abs(playerKart.speed)*0.04;

    let desiredPos=target.clone()
        .add(forward.clone().multiplyScalar(-camDist))
        .add(new THREE.Vector3(0,camHeight,0));

    // Screen shake
    if(screenShake.timer>0){
        screenShake.timer-=0.016;
        const sx=(Math.random()-0.5)*screenShake.intensity*2;
        const sy=(Math.random()-0.5)*screenShake.intensity*2;
        const sz=(Math.random()-0.5)*screenShake.intensity*1;
        desiredPos.add(new THREE.Vector3(sx,sy,sz));
        screenShake.intensity*=0.92;
    }

    camera.position.lerp(desiredPos,0.07);
    camera.lookAt(target.clone().add(forward.clone().multiplyScalar(6)));
}

// ============================================================
// DRIFT/BOOST
// ============================================================
function handleDrift(kart,input,dt){
    if(input.drift&&Math.abs(kart.speed)>10&&(input.left||input.right)){
        if(!kart.isDrifting){
            kart.isDrifting=true;
            sound.playDrift();
        }
        const steerDir=input.left?1:(input.right?-1:0);
        kart.driftAngle=lerp(kart.driftAngle,steerDir*1.8,dt*5);
        kart.boostGauge+=dt*CONFIG.driftChargeRate*Math.abs(steerDir);
        spawnParticles(kart.position.clone().add(new THREE.Vector3(0,0.1,0)),0x888888,1,0.2,1.5);
        if(Math.random()<0.3)spawnSkidMark(kart.position);
    }else{
        if(kart.isDrifting&&kart.boostGauge>=CONFIG.driftThreshold){
            kart.boostTimer=Math.min(kart.boostGauge/CONFIG.driftThreshold*1.0,CONFIG.boostDuration);
            kart.boostActive=true;
            spawnParticles(kart.position.clone(),0xff6600,20);
            sound.playBoost();
            sound.stopDrift();
        }
        kart.isDrifting=false;
        kart.driftAngle=lerp(kart.driftAngle,0,dt*5);
        if(!input.drift){
            kart.boostGauge=Math.max(0,kart.boostGauge-dt*4);
        }
        if(!kart.isDrifting)sound.stopDrift();
    }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime=0;

function gameLoop(time){
    requestAnimationFrame(gameLoop);
    const dt=Math.min((time-lastTime)/1000,0.05);
    lastTime=time;

    // Animate water
    scene.children.forEach(child=>{
        if(child.userData&&child.userData.isWater){
            const pos=child.geometry.attributes.position;
            for(let i=0;i<pos.count;i++){
                const x=pos.getX(i),z=pos.getZ(i);
                pos.setY(i,Math.sin(x*0.2+time*0.001)*0.3+Math.sin(z*0.15+time*0.0007)*0.25);
            }
            pos.needsUpdate=true;
            child.geometry.computeVertexNormals();
        }
    });

    // Animate billboards (gentle sway)
    scene.children.forEach(child=>{
        if(child.userData&&child.userData.phase!==undefined&&child.children.length>=2){
            const sway=Math.sin(time*0.0005+child.userData.phase)*0.005;
            child.rotation.z=sway;
        }
    });

    // Animate trees
    scene.children.forEach(child=>{
        if(child.userData&&child.userData.baseX!==undefined){
            const sway=Math.sin(time*0.001*child.userData.speed+child.userData.phase)*child.userData.amp;
            child.position.x=child.userData.baseX+sway;
            child.position.z=child.userData.baseZ+Math.cos(time*0.001*child.userData.speed+child.userData.phase)*child.userData.amp*0.3;
        }
        if(child.type==='Group'&&child.children.length>0&&child.children[0]&&child.children[0].material&&
           child.children[0].material.opacity===0.5){
            child.position.x+=dt*child.userData.speed*0.3;
            if(child.position.x>600)child.position.x=-600;
        }
    });

    // Boost pad glow animation
    for(const bp of boostPadPositions){
        if(bp.active){
            spawnParticles(bp.pos.clone().add(new THREE.Vector3(0,0.2,0)),0x00bbff,1,0.05,0.3);
        }
    }

    if(raceState==='countdown'){
        updateCamera();
        renderer.render(scene,camera);
        return;
    }

    if(raceState==='racing'){
        raceTime+=dt;
        const input=getInput();

        if(!playerKart.finished&&playerKart.spinTimer<=0){
            const accelInput=input.forward?1:(input.backward?-0.6:0);
            if(accelInput!==0){
                playerKart.speed+=accelInput*playerKart.acceleration*dt;
            }else{
                const decel=22*dt;
                if(Math.abs(playerKart.speed)>decel)playerKart.speed-=Math.sign(playerKart.speed)*decel;
                else playerKart.speed=0;
            }

            // Slipstream
            const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(playerKart.quaternion);
            for(const ai of aiKarts){
                if(ai.finished)continue;
                const diff=ai.position.clone().sub(playerKart.position);
                const dist=diff.length();
                if(dist<CONFIG.slipstreamRange&&dist>0.5){
                    const dir=diff.normalize();
                    if(fwd.dot(dir)>0.6&&playerKart.speed<playerKart.maxSpeed*1.15){
                        playerKart.speed+=playerKart.acceleration*0.25*dt;
                        spawnParticles(playerKart.position.clone(),0x88ccff,1,0.1,0.5);
                    }
                }
            }

            const maxSpd=playerKart.boostActive?playerKart.maxSpeed*CONFIG.boostMultiplier:playerKart.maxSpeed;
            playerKart.speed=clamp(playerKart.speed,-playerKart.maxSpeed*0.4,maxSpd);

            const steerDir=input.left?1:(input.right?-1:0);
            const speedFactor=Math.abs(playerKart.speed)/playerKart.maxSpeed;
            playerKart.rotation.y+=steerDir*CONFIG.turnSpeed*(0.25+speedFactor*0.75)*dt;

            handleDrift(playerKart,input,dt);
        }

        playerKart.update(dt);
        updateAI(aiKarts,dt);
        checkKartCollisions([playerKart,...aiKarts]);

        for(const k of [playerKart,...aiKarts]){
            checkItemPickups(k);
            checkBoostPads(k,dt);
        }
        updateBoostPadTimers(dt);
        updateItemPickups(dt);
        updateProjectiles(dt,[playerKart,...aiKarts]);
        updateParticleMesh(dt);
        updateCamera();
        updateHUD();
        updateHUDSmooth();
        drawMinimap();
        updateSpeedLines(dt,playerKart);
        updateExhaust(playerKart,dt);
        for(const ai of aiKarts)updateExhaust(ai,dt);
        updateRain(dt);
    }

    renderer.render(scene,camera);
    drawSpeedLinesCanvas();
    drawScreenEffects();
}

// Use item with E
let lastItemUse=0;
let lastDisplayedSpeed=0;

// ============================================================
// HUD ANIMATION HELPERS
// ============================================================
function animateNumber(el,target,duration){
    if(!el)return;
    const current=parseFloat(el.textContent)||0;
    const startTime=performance.now();
    const startVal=current;
    function tick(){
        const t=(performance.now()-startTime)/duration;
        if(t>=1){el.textContent=Math.round(target);return;}
        const eased=1-Math.pow(1-t,3);
        el.textContent=Math.round(startVal+(target-startVal)*eased);
        requestAnimationFrame(tick);
    }
    tick();
}

// ============================================================
// UPDATE HUD WITH ANIMATION
// ============================================================
function updateHUDSmooth(){
    if(!playerKart)return;
    const rawSpeed=Math.abs(playerKart.speed)*3.2;
    const targetSpeed=Math.round(rawSpeed);
    if(Math.abs(targetSpeed-lastDisplayedSpeed)>2){
        const el=document.getElementById('speedDisplay');
        if(el)el.textContent=targetSpeed;
        lastDisplayedSpeed=targetSpeed;
    }
}
document.addEventListener('keydown',(e)=>{
    if((e.key==='e'||e.key==='E')&&performance.now()-lastItemUse>250){
        if(playerKart&&playerKart.currentItem&&raceState==='racing'&&!playerKart.finished){
            playerKart.useItem(items,[playerKart,...aiKarts]);
            lastItemUse=performance.now();
        }
    }
});

// ============================================================
// SPEED LINES CANVAS SETUP
// ============================================================
function initSpeedLinesCanvas(){
    const canvas=document.getElementById('speedLinesCanvas');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    window.addEventListener('resize',()=>{
        canvas.width=window.innerWidth;
        canvas.height=window.innerHeight;
    });
}

function drawSpeedLinesCanvas(){
    const canvas=document.getElementById('speedLinesCanvas');
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(speedLines.length===0)return;
    ctx.strokeStyle='rgba(220,240,255,0.12)';
    ctx.lineCap='round';
    for(const sl of speedLines){
        const lr=sl.life/sl.maxLife;
        const speedRatio=playerKart?Math.abs(playerKart.speed/playerKart.maxSpeed):0;
        const alpha=lr*0.15*speedRatio;
        if(alpha<0.01)continue;
        ctx.globalAlpha=alpha;
        ctx.lineWidth=sl.width*lr*2;
        const dir=sl.vel.clone().normalize();
        // Project to screen
        const start=new THREE.Vector3(sl.pos.x,sl.pos.y,sl.pos.z);
        const end=start.clone().add(dir.clone().multiplyScalar(sl.length));
        start.project(camera);end.project(camera);
        const sx=(start.x*0.5+0.5)*canvas.width;
        const sy=(-start.y*0.5+0.5)*canvas.height;
        const ex=(end.x*0.5+0.5)*canvas.width;
        const ey=(-end.y*0.5+0.5)*canvas.height;
        ctx.beginPath();
        ctx.moveTo(sx,sy);
        ctx.lineTo(ex,ey);
        ctx.stroke();
    }
    ctx.globalAlpha=1;
}

// ============================================================
// INIT
// ============================================================
function init(){
    initScene();
    buildTrack();
    initParticleSystem();
    initSpeedLinesCanvas();
    sound.init();
    createTouchControls();
    initRace();
    document.getElementById('loadingScreen').style.display='none';
    lastTime=performance.now();
    gameLoop(lastTime);
}

window.restartRace=restartRace;

window.addEventListener('load',()=>{setTimeout(init,600)});
</script>
